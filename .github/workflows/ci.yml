name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Biome check
        run: yarn biome check

      - name: Biome lint
        run: yarn biome lint

      - name: Validate changeset status
        run: yarn changeset status --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - "@remunda/backstage-plugin-datacontract"
          - "@remunda/backstage-plugin-datacontract-backend"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn workspace ${{ matrix.workspace }} test --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    strategy:
      matrix:
        workspace:
          - "@remunda/backstage-plugin-datacontract"
          - "@remunda/backstage-plugin-datacontract-backend"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn workspace ${{ matrix.workspace }} build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.workspace }}
          path: |
            plugins/*/dist/
            plugins/*/dist-types/
          retention-days: 7
