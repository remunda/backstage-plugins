name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Biome CI
        run: yarn biome ci

      - name: Type check
        run: yarn tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        workspace:
          - "@remunda/backstage-plugin-datacontract"
          - "@remunda/backstage-plugin-datacontract-backend"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn workspace ${{ matrix.workspace }} test --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    strategy:
      matrix:
        workspace:
          - "@remunda/backstage-plugin-datacontract"
          - "@remunda/backstage-plugin-datacontract-backend"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Build package
        run: yarn workspace ${{ matrix.workspace }} build

      - name: Generate artifact name
        id: artifact-name
        run: echo "name=build-$(echo "${{ matrix.workspace }}" | sed 's/\//-/g')-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            plugins/*/dist/
            plugins/*/dist-types/
          retention-days: 7
