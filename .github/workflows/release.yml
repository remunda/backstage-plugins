name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release All Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all packages
        run: yarn build

      - name: Run semantic-release
        id: semantic
        run: |
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get released version
        id: version
        run: |
          # Check if a release was made by looking for the git tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")" ]; then
            VERSION=${LATEST_TAG#v}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
            echo "New version released: ${VERSION}"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No new version released"
          fi

      - name: Sync workspace package versions
        if: steps.version.outputs.released == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Syncing all workspace packages to version ${VERSION}"
          node scripts/sync-versions.js "${VERSION}"

      - name: Build packages with new version
        if: steps.version.outputs.released == 'true'
        run: yarn build

      - name: Pack all packages
        if: steps.version.outputs.released == 'true'
        run: |
          # Pack all workspace packages
          yarn workspaces foreach --no-private exec "mkdir -p local-publish"
          yarn workspaces foreach --no-private exec "npm pack --pack-destination=local-publish"

      - name: Publish to npm
        if: steps.version.outputs.released == 'true'
        run: |
          # Publish all packages to npm
          yarn workspaces foreach --no-private exec "npm publish --provenance --access public"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version sync
        if: steps.version.outputs.released == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/*/package.json
          git commit -m "chore: sync workspace versions to ${{ steps.version.outputs.version }} [skip ci]" || true
          git push origin main

      - name: Upload package artifacts
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-archives-${{ steps.version.outputs.version }}
          path: plugins/*/local-publish/*.tgz
          retention-days: 30
