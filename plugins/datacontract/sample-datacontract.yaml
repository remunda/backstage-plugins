dataContractSpecification: 0.9.2
id: urn:datacontract:checkout:orders-latest
info:
  title: Orders Latest
  version: 1.0.0
  description: |
    Successful customer orders in the webshop. 
    All orders since 2020-01-01.
    Updated daily via automated ETL.
  owner: checkout-team
  contact:
    name: John Doe
    email: john.doe@example.com
    url: https://github.com/checkout-team
  status: active
tags:
- orders
- ecommerce
- daily
models:
  orders:
    type: table
    description: Successful customer orders in the webshop
    fields:
      order_id:
        type: string
        description: Primary key of the orders table
        required: true
        primaryKey: true
        examples: [ "O-123456" ]
        classification: public
      customer_id:
        type: string
        description: Unique identifier for the customer
        required: true
        examples: [ "C-789012" ]
        classification: internal
      customer_email:
        type: string
        description: Email address of the customer
        required: true
        format: email
        examples: [ "customer@example.com" ]
        classification: private
        pii: true
      order_total:
        type: number
        description: Total amount of the order in USD
        required: true
        examples: [ 99.99 ]
        classification: public
      order_status:
        type: string
        description: Current status of the order
        required: true
        examples: [ "delivered" ]
        classification: public
      order_date:
        type: string
        description: Date when the order was placed
        required: true
        format: date
        examples: [ "2023-09-15" ]
        classification: public
      shipping_address:
        type: object
        description: Shipping address details
        required: false
        classification: private
        pii: true
  customers:
    type: table
    description: Customer information
    fields:
      customer_id:
        type: string
        description: Unique identifier for the customer
        required: true
        primaryKey: true
        examples: [ "C-789012" ]
        classification: internal
      first_name:
        type: string
        description: Customer's first name
        required: true
        examples: [ "Jane" ]
        classification: private
        pii: true
      last_name:
        type: string
        description: Customer's last name
        required: true
        examples: [ "Smith" ]
        classification: private
        pii: true
      email:
        type: string
        description: Customer's email address
        required: true
        format: email
        unique: true
        examples: [ "jane.smith@example.com" ]
        classification: private
        pii: true
servers:
  production:
    type: bigquery
    environment: production
    project: my-gcp-project
    dataset: ecommerce
    description: Production BigQuery dataset
  staging:
    type: bigquery
    environment: staging
    project: my-gcp-project-staging
    dataset: ecommerce_staging
    description: Staging environment for testing
terms:
  usage: |
    This data can be used for analytics, reporting, and business intelligence.
    Do not use for marketing without explicit customer consent.
  limitations: |
    - Do not join with external datasets without approval
    - PII fields require special handling according to privacy policy
    - Data older than 7 years should not be used for decision making
  billing: Pay-per-query model
  noticePeriod: 30 days
servicelevels:
  availability:
    description: Data availability commitment
    percentage: "99.9%"
  retention:
    description: How long data is kept
    period: "7 years"
    unlimited: false
  freshness:
    description: How current the data is
    threshold: "24 hours"
    timestampField: "order_date"
  frequency:
    description: How often data is updated
    type: "batch"
    interval: "daily"
    cron: "0 2 * * *"
  support:
    description: Support availability
    time: "9 AM - 5 PM EST, Monday-Friday"
    responseTime: "24 hours for non-critical issues"
examples:
- model: orders
  type: csv
  description: Sample order data
  data: |
    order_id,customer_id,order_total,order_status,order_date
    O-123456,C-789012,99.99,delivered,2023-09-15
    O-123457,C-789013,156.78,processing,2023-09-16
    O-123458,C-789014,42.50,shipped,2023-09-16
definitions:
  ecommerce/order_status:
    title: Order Status
    type: string
    description: Standardized order status values
    enum:
    - pending
    - processing
    - shipped
    - delivered
    - cancelled
    - refunded
    examples: [ delivered ]
    classification: public
  ecommerce/customer_tier:
    title: Customer Tier
    type: string
    description: Customer loyalty tier
    enum:
    - bronze
    - silver
    - gold
    - platinum
    examples: [ gold ]
    classification: internal
links:
  Documentation: https://docs.example.com/orders
  Dashboard: https://analytics.example.com/orders
  Support: https://support.example.com
